workflows:
  ios-debug-build:
    name: iOS Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_ROOT: $HOME/programs/flutter
    scripts:
      - name: Diagnostics (Flutter/CocoaPods)
        script: |
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          which flutter || true
          flutter --version
          ruby --version
          pod --version
          ls -la ios/Flutter || true
          if [ -f ios/Flutter/Generated.xcconfig ]; then
            echo "Generated.xcconfig FLUTTER_ROOT:"
            sed -n 's/^FLUTTER_ROOT=.*/&/p' ios/Flutter/Generated.xcconfig || true
          fi
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Generate missing iOS files (if any)
        script: |
          flutter create .

      - name: Pre-build iOS pods
        script: |
          cd ios || exit
          pod install --repo-update
          cd ..

      - name: Build iOS Debug for Simulator
        script: |
          flutter build ios --debug --simulator --no-codesign

      - name: Package Simulator .app
        script: |
          if [ -d build/ios/iphonesimulator/Runner.app ]; then
            cd build/ios/iphonesimulator
            zip -r Runner.app.zip Runner.app
            cd -
          fi

    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip

    publishing:
      email:
        recipients:
          - mohamed.hossam93x@gmail.com

  ios-release-ipa:
    name: iOS Release IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.example.medicinder # Update to your real bundle id
        FLUTTER_ROOT: $HOME/programs/flutter
    # To enable automatic code signing:
    # 1) In Codemagic UI, add your App Store Connect API key (Key ID, Issuer ID, Private Key)
    # 2) Enable Automatic code signing for this workflow and select the bundle id
    # Alternatively, configure manual signing by uploading .p12 and .mobileprovision files as variables
    scripts:
      - name: Diagnostics (Flutter/CocoaPods)
        script: |
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          which flutter || true
          flutter --version
          ruby --version
          pod --version
          ls -la ios/Flutter || true
          if [ -f ios/Flutter/Generated.xcconfig ]; then
            echo "Generated.xcconfig FLUTTER_ROOT:"
            sed -n 's/^FLUTTER_ROOT=.*/&/p' ios/Flutter/Generated.xcconfig || true
          fi
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Ensure iOS files are present
        script: |
          flutter create .

      - name: Install CocoaPods
        script: |
          cd ios || exit
          pod repo update
          pod install
          cd ..

      - name: Build signed IPA (Release)
        script: |
          # Codemagic will inject signing settings when Automatic code signing is enabled
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

    publishing:
      email:
        recipients:
          - mohamed.hossam93x@gmail.com
      # To publish to App Store Connect, enable App Store Connect publishing in Codemagic UI