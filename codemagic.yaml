workflows:
  ios-simulator:
    name: iOS Simulator build (no codesign)

    environment:
      flutter: stable
      xcode: latest
      # لو مش محتاج .env شيل السطور دي
      groups:
        - secret_env   # فيه API_KEY, BASE_URL ... من Codemagic

    scripts:
      - name: Show versions
        script: |
          flutter --version
          dart --version

      # اختياري: versioning بسيط
      - name: Setup build version
        script: |
          export APP_VERSION=${APP_VERSION:-1.0.0}
          export BUILD_NUMBER=${BUILD_NUMBER:-1}
          echo "Using version: $APP_VERSION+$BUILD_NUMBER"

      # اختياري: لو لسه عايز تنشئ .env من الـ env vars
      - name: Create .env from Codemagic variables
        script: |
          echo "API_KEY=$API_KEY"    > .env
          echo "BASE_URL=$BASE_URL" >> .env
          echo ".env created"

      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Build iOS for simulator
        script: |
          flutter build ios --simulator --no-codesign \
            --build-name=$APP_VERSION \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/iphonesimulator/**/*.app
      - .env
