workflows:
  ios-debug-build:
    name: iOS Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
       
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Pre-build iOS pods
        script: |
          cd ios
          pod install --repo-update || true   # نتخطى الأخطاء لو pods مش متاحة
          cd ..

      - name: Build iOS Debug Archive
        script: |
          flutter build ios --debug --no-codesign --simulator
          # لو عايز تحافظ على نسخة archive
          mkdir -p build/ios/archive
          cp -R build/ios/Debug-iphonesimulator/Runner.app build/ios/archive/

    artifacts:
      - build/ios/archive/**  # هياخد أي ملف أو مجلد جوه archive
          
    publishing:
      email:
        recipients:
          - mohamed.hossam93x@gmail.com
