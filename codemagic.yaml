workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios
      - name: Generate files
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs || true
      - name: Generate iOS plugin registrant
        script: |
          flutter packages get
          flutter build ios-framework --no-codesign
      - name: iOS pod install
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Build iOS
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - mohamed.hossam93x@gmail.com
