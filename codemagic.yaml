workflows:
  ios-debug-build:
    name: iOS Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
       
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Generate missing iOS files (if any)
        script: |
          flutter create .

      - name: Pre-build iOS pods
        script: |
          cd ios || exit
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "No Podfile found, skipping pod install"
          fi
          cd ..

      - name: Build iOS Debug for Simulator
        script: |
          flutter build ios --debug --simulator --no-codesign
          
    artifacts:
      - build/ios/Debug-iphonesimulator/Runner.app
    publishing:
      email:
        recipients:
          - mohamed.hossam93x@gmail.com
