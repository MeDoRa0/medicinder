name: medicinder
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.2+6

environment:
  sdk: ^3.8.1

dependencies:
  awesome_notifications: ^0.11.0
  cloud_firestore: ^5.6.1
  connectivity_plus: ^6.1.1
  equatable: ^2.0.5
  firebase_auth: ^5.3.4
  firebase_core: ^3.9.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: ^9.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  shared_preferences: ^2.0.0
  timezone: ^0.11.0
  uuid: ^4.5.1
  fl_chart: ^1.1.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#2196F3"
    theme_color: "#1976D2"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/l10n/
    - assets/icon/
    - assets/screenshots/
